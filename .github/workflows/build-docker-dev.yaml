name: build dev docker image

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_dev_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          git checkout --force "${GITHUB_SHA}"

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve dev image version
        id: version
        run: |
          set -euo pipefail

          git fetch origin main:refs/remotes/origin/main
          git fetch --tags origin

          main_branch_version="$(
            git show origin/main:Dockerfile \
              | sed -n 's/^ARG APP_VERSION=//p' \
              | tail -n 1
          )"

          latest_release_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -n "${latest_release_tag}" ]]; then
            base_version="${latest_release_tag#v}"
            base_commit="$(git rev-list -n 1 "${latest_release_tag}")"
          else
            base_version="${main_branch_version}"
            if ! base_commit="$(git merge-base HEAD origin/main)"; then
              base_commit="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            fi
          fi

          if [[ -z "${base_version}" ]]; then
            echo "Unable to determine a base version from Git tags or origin/main:Dockerfile" >&2
            exit 1
          fi

          if [[ ! "${base_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Base version '${base_version}' is not valid semver (x.y.z)." >&2
            exit 1
          fi

          commits_since_base="$(git rev-list --count "${base_commit}..HEAD")"
          if (( commits_since_base < 1 )); then
            commits_since_base=1
          fi

          dev_version="$(printf '%s-dev%03d' "${base_version}" "${commits_since_base}")"

          echo "base_version=${base_version}" >> "${GITHUB_OUTPUT}"
          echo "version=${dev_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name medialyze-builder --use
          docker buildx inspect --bootstrap

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push dev image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --build-arg "APP_VERSION=${{ steps.version.outputs.version }}" \
            --tag "${IMAGE_NAME}:dev" \
            --tag "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .
