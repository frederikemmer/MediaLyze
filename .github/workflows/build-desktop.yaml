name: publish desktop release artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build desktop assets for, for example v0.2.3
        required: true
        type: string
      code_ref:
        description: Git ref to build from. Defaults to the release tag and can be used for release rebuilds when only build logic changed.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build_desktop_release:
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.event.release.tag_name }}
      BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.code_ref || github.event.inputs.tag_name) || github.event.release.tag_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          git checkout --force "${BUILD_REF}" || git checkout --force "origin/${BUILD_REF}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release metadata
        run: python .github/scripts/release_metadata.py validate --tag-ref "refs/tags/${{ env.RELEASE_TAG }}"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install backend build dependencies
        run: python -m pip install -e . pyinstaller

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Run desktop packaging regression tests
        run: npm test
        working-directory: desktop

      - name: Build static ffprobe on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ca-certificates curl nasm pkg-config xz-utils musl-tools binutils
          desktop/scripts/build-linux-static-ffprobe.sh

      - name: Install ffmpeg on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          mkdir -p dist/ffprobe-bundle
          cp "$(command -v ffprobe)" dist/ffprobe-bundle/ffprobe

      - name: Bundle ffprobe on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist/ffprobe-bundle | Out-Null
          $ffprobeTarget = Join-Path $PWD "dist/ffprobe-bundle/ffprobe.exe"

          $existingFfprobe = Get-Command ffprobe -ErrorAction SilentlyContinue
          if ($null -ne $existingFfprobe) {
            Copy-Item $existingFfprobe.Source $ffprobeTarget -Force
            exit 0
          }

          $archivePath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials"

          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile $archivePath `
            -MaximumRetryCount 3 `
            -RetryIntervalSec 5

          if (Test-Path $extractPath) {
            Remove-Item $extractPath -Recurse -Force
          }

          Expand-Archive -Path $archivePath -DestinationPath $extractPath -Force

          $downloadedFfprobe = Get-ChildItem -Path $extractPath -Filter ffprobe.exe -Recurse | Select-Object -First 1
          if ($null -eq $downloadedFfprobe) {
            throw "Unable to locate ffprobe.exe in downloaded FFmpeg archive."
          }

          Copy-Item $downloadedFfprobe.FullName $ffprobeTarget -Force

      - name: Build backend sidecar
        run: node ./scripts/build-backend.mjs
        working-directory: desktop
        env:
          MEDIALYZE_FFPROBE_DIR: ${{ github.workspace }}/dist/ffprobe-bundle

      - name: Build desktop release
        if: matrix.os != 'windows-latest'
        run: npm run dist -- --publish never
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build desktop release on Windows with retry
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          $ErrorActionPreference = "Stop"
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Windows desktop build attempt $attempt of $maxAttempts"

            npm run dist -- --publish never
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -ge $maxAttempts) {
              throw "Windows desktop build failed after $maxAttempts attempts."
            }

            Write-Warning "Windows desktop build failed on attempt $attempt with exit code $LASTEXITCODE. Retrying after 15 seconds."
            Start-Sleep -Seconds 15
          }

      - name: Verify desktop artifact name
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              expected="dist/desktop-app/MediaLyze.AppImage"
              ;;
            macos-latest)
              expected="dist/desktop-app/MediaLyze-arm64.dmg"
              ;;
            windows-latest)
              expected="dist/desktop-app/MediaLyze.Setup.exe"
              ;;
          esac

          if [[ ! -f "$expected" ]]; then
            echo "Expected desktop artifact not found: $expected" >&2
            echo "Available files:" >&2
            ls -la dist/desktop-app >&2
            exit 1
          fi

      - name: Verify Linux AppImage ffprobe bundle
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          appimage="dist/desktop-app/MediaLyze.AppImage"
          chmod +x "$appimage"
          rm -rf squashfs-root
          "$appimage" --appimage-extract >/dev/null

          ffprobe_dir="squashfs-root/resources/backend/ffprobe"
          ffprobe_bin="$ffprobe_dir/ffprobe"

          if [[ ! -x "$ffprobe_bin" ]]; then
            echo "Bundled ffprobe executable is missing from AppImage: $ffprobe_bin" >&2
            exit 1
          fi

          if [[ -e "$ffprobe_dir/ffprobe-medialyze" ]]; then
            echo "Linux AppImage must not bundle the old ffprobe wrapper." >&2
            exit 1
          fi

          if find "$ffprobe_dir" -type f -name 'libav*.so*' | grep -q .; then
            echo "Linux AppImage must not bundle dynamic FFmpeg shared libraries." >&2
            find "$ffprobe_dir" -type f -name 'libav*.so*' >&2
            exit 1
          fi

          if readelf -d "$ffprobe_bin" | grep -q '(NEEDED)'; then
            echo "Bundled ffprobe is dynamically linked; expected static binary." >&2
            readelf -d "$ffprobe_bin" >&2
            exit 1
          fi

          "$ffprobe_bin" -version >/dev/null

          python3 - <<'PY'
          import wave
          from pathlib import Path

          path = Path("dist/ffprobe-smoke.wav")
          with wave.open(str(path), "w") as wav:
              wav.setnchannels(1)
              wav.setsampwidth(2)
              wav.setframerate(8000)
              wav.writeframes(b"\x00\x00" * 8000)
          PY

          "$ffprobe_bin" -v error -print_format json -show_format -show_streams dist/ffprobe-smoke.wav >/tmp/ffprobe-smoke.json
          grep -q '"codec_name": "pcm_s16le"' /tmp/ffprobe-smoke.json

      - name: Upload desktop asset to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              asset="dist/desktop-app/MediaLyze.AppImage"
              ;;
            macos-latest)
              asset="dist/desktop-app/MediaLyze-arm64.dmg"
              ;;
            windows-latest)
              asset="dist/desktop-app/MediaLyze.Setup.exe"
              ;;
          esac

          gh release upload "${{ env.RELEASE_TAG }}" "$asset" --clobber
