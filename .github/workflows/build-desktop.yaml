name: publish desktop release artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_desktop_release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release metadata
        run: python .github/scripts/release_metadata.py validate --tag-ref "refs/tags/${{ github.event.release.tag_name }}"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install backend build dependencies
        run: python -m pip install -e . pyinstaller

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Install ffmpeg on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          mkdir -p dist/ffprobe-bundle
          cp "$(command -v ffprobe)" dist/ffprobe-bundle/ffprobe

      - name: Install ffmpeg on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install ffmpeg
          mkdir -p dist/ffprobe-bundle
          cp "$(command -v ffprobe)" dist/ffprobe-bundle/ffprobe

      - name: Install ffmpeg on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install ffmpeg -y
          New-Item -ItemType Directory -Force -Path dist/ffprobe-bundle | Out-Null
          $ffprobe = (Get-Command ffprobe).Source
          Copy-Item $ffprobe dist/ffprobe-bundle/ffprobe.exe

      - name: Build backend sidecar
        run: node ./scripts/build-backend.mjs
        working-directory: desktop
        env:
          MEDIALYZE_FFPROBE_DIR: ${{ github.workspace }}/dist/ffprobe-bundle

      - name: Build desktop release
        run: npx electron-builder --publish never
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload desktop asset to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          assets=()
          case "${{ matrix.os }}" in
            ubuntu-latest)
              assets=(dist/desktop-app/*.AppImage)
              ;;
            macos-latest)
              assets=(dist/desktop-app/*.dmg)
              ;;
            windows-latest)
              assets=(dist/desktop-app/*.exe)
              ;;
          esac

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No desktop artifacts found for ${{ matrix.os }}" >&2
            exit 1
          fi

          gh release upload "${{ github.event.release.tag_name }}" "${assets[@]}" --clobber
