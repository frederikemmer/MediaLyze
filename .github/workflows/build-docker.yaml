name: publish official release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'desktop/package.json'

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  publish_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"
          git checkout --force "${GITHUB_SHA}"

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Validate release metadata
        run: python3 .github/scripts/release_metadata.py validate

      - name: Resolve release version
        id: version
        run: echo "version=$(python3 .github/scripts/release_metadata.py version)" >> "$GITHUB_OUTPUT"

      - name: Check whether this push bumps the release version
        id: release_gate
        run: |
          set -euo pipefail

          current_version="${{ steps.version.outputs.version }}"
          previous_ref="${{ github.event.before }}"
          previous_version=""

          if [[ -n "${previous_ref}" ]] && [[ "${previous_ref}" != "0000000000000000000000000000000000000000" ]]; then
            previous_version="$(
              git show "${previous_ref}:Dockerfile" 2>/dev/null \
                | sed -n 's/^ARG APP_VERSION=//p' \
                | tail -n 1
            )"
          fi

          if [[ -z "${previous_version}" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "previous_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "previous_version=${previous_version}" >> "$GITHUB_OUTPUT"

          if [[ "${previous_version}" == "${current_version}" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          highest_version="$(printf '%s\n%s\n' "${previous_version}" "${current_version}" | sort -V | tail -n 1)"
          if [[ "${highest_version}" != "${current_version}" ]]; then
            echo "Release version must increase on main pushes (${previous_version} -> ${current_version} is invalid)." >&2
            exit 1
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Log skipped release
        if: steps.release_gate.outputs.should_release != 'true'
        run: |
          echo "Skipping official release for ${GITHUB_SHA}"
          echo "Version unchanged at ${{ steps.version.outputs.version }}"

      - name: Check existing tag and release state
        id: state
        if: steps.release_gate.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          tag_name="v${version}"

          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${tag_name}")"
            if [[ "${tag_commit}" != "${GITHUB_SHA}" ]]; then
              echo "Tag ${tag_name} already exists on ${tag_commit}, expected ${GITHUB_SHA}." >&2
              exit 1
            fi
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "${tag_name}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log release target
        if: steps.release_gate.outputs.should_release == 'true'
        run: |
          echo "Publishing version ${{ steps.version.outputs.version }} from ${GITHUB_SHA}"
          echo "previous_version=${{ steps.release_gate.outputs.previous_version }}"
          echo "tag_exists=${{ steps.state.outputs.tag_exists }}"
          echo "release_exists=${{ steps.state.outputs.release_exists }}"

      - name: Set up QEMU
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      - name: Set up Docker Buildx
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        run: |
          docker buildx create --name medialyze-builder --use
          docker buildx inspect --bootstrap

      - name: Log in to GitHub Container Registry
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push image
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --build-arg "APP_VERSION=${{ steps.version.outputs.version }}" \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .

      - name: Extract release notes
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        run: python3 .github/scripts/release_metadata.py release-notes --version "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Create annotated git tag
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.tag_exists != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" "${GITHUB_SHA}" -m "MediaLyze v${{ steps.version.outputs.version }}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MediaLyze v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md

      - name: Trigger desktop release workflow
        if: steps.release_gate.outputs.should_release == 'true' && steps.state.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-desktop.yaml \
            --repo "${GITHUB_REPOSITORY}" \
            -f tag_name="v${{ steps.version.outputs.version }}"
