name: auto docker image building/publishing
on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/frederikemmer/medialyze

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Read image version
        id: version
        run: echo "version=$(sed -n 's/^ARG APP_VERSION=//p' Dockerfile | head -n 1)" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        run: |
          docker build \
            --build-arg APP_VERSION="${{ steps.version.outputs.version }}" \
            -t "${IMAGE_NAME}:latest" \
            -t "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            .
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ steps.version.outputs.version }}"
