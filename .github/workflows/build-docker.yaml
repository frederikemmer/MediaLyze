name: publish official release
on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'frontend/package.json'
      - 'desktop/package.json'
      - 'frontend/package-lock.json'
      - 'CHANGELOG.md'
      - '.github/scripts/release_metadata.py'

permissions:
  contents: write
  packages: write

jobs:
  publish_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Validate release metadata
        run: python3 .github/scripts/release_metadata.py validate

      - name: Resolve release version
        id: version
        run: echo "version=$(python3 .github/scripts/release_metadata.py version)" >> "$GITHUB_OUTPUT"

      - name: Check existing tag and release state
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          tag_name="v${version}"

          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${tag_name}")"
            if [[ "${tag_commit}" != "${GITHUB_SHA}" ]]; then
              echo "Tag ${tag_name} already exists on ${tag_commit}, expected ${GITHUB_SHA}." >&2
              exit 1
            fi
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "${tag_name}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log release target
        run: |
          echo "Publishing version ${{ steps.version.outputs.version }} from ${GITHUB_SHA}"
          echo "tag_exists=${{ steps.state.outputs.tag_exists }}"
          echo "release_exists=${{ steps.state.outputs.release_exists }}"

      - name: Set up QEMU
        if: steps.state.outputs.release_exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.state.outputs.release_exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.state.outputs.release_exists != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.state.outputs.release_exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Extract release notes
        if: steps.state.outputs.release_exists != 'true'
        run: python3 .github/scripts/release_metadata.py release-notes --version "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Create annotated git tag
        if: steps.state.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" "${GITHUB_SHA}" -m "MediaLyze v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.state.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MediaLyze v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
