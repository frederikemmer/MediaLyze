services:
  medialyze:
    image: medialyze:local
    container_name: medialyze
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      CONFIG_PATH: /config
      MEDIA_ROOT: /media
      TZ: ${TZ:-UTC}
    volumes:
      - medialyze_config:/config
      - ${MEDIA_ROOT:-./media}:/media:ro

volumes:
  medialyze_config:
    driver: local